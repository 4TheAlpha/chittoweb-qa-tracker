<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chittoweb Complete Launch Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--card:#fff;--border:#e0e4ea;--text:#1a1d23;--muted:#6b7280;
  --green:#16a34a;--green-bg:#dcfce7;--red:#dc2626;--red-bg:#fee2e2;
  --amber:#d97706;--amber-bg:#fef3c7;--grey:#94a3b8;--grey-bg:#f1f5f9;
  --blue:#2563eb;--blue-bg:#dbeafe;--purple:#7c3aed;--purple-bg:#ede9fe;
  --teal:#0d9488;--teal-bg:#ccfbf1;
  --pink:#ec4899;--pink-bg:#fce7f3;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:16px 20px 40px}
.header{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;background:linear-gradient(135deg,#1e293b,#334155);color:#fff;border-radius:var(--radius);margin-bottom:20px}
.header h1{font-size:1.35rem;font-weight:700;letter-spacing:-.3px}
.header-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.header .date{font-size:.85rem;opacity:.8}
.header input[type=text]{padding:6px 12px;border:1px solid rgba(255,255,255,.25);border-radius:6px;background:rgba(255,255,255,.12);color:#fff;font-size:.85rem;width:180px;outline:none}
.header input[type=text]::placeholder{color:rgba(255,255,255,.5)}
.header input[type=text]:focus{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.18)}
.master-summary{background:linear-gradient(135deg,#0f172a,#1e293b);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;color:#fff;box-shadow:var(--shadow)}
.master-summary .master-title{font-size:.8rem;text-transform:uppercase;letter-spacing:1px;opacity:.7;margin-bottom:10px;font-weight:600}
.master-summary .master-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px}
.master-summary .master-card{text-align:center;padding:8px 6px;border-radius:var(--radius);background:rgba(255,255,255,.08)}
.master-summary .master-card .num{font-size:1.5rem;font-weight:700}
.master-summary .master-card .lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.5px;opacity:.7;margin-top:2px}
.master-summary .master-card.pass .num{color:#4ade80}
.master-summary .master-card.fail .num{color:#f87171}
.master-summary .master-card.blocked .num{color:#fbbf24}
.master-summary .master-card.notrun .num{color:#94a3b8}
.master-summary .master-card.pct .num{color:#60a5fa}
.master-summary .master-bar{margin-top:12px;height:8px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden}
.master-summary .master-bar-fill{height:100%;background:linear-gradient(90deg,#4ade80,#22d3ee);border-radius:99px;transition:width .4s ease}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:16px}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;text-align:center;box-shadow:var(--shadow)}
.summary-card .num{font-size:1.6rem;font-weight:700}
.summary-card .lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-top:2px}
.summary-card.total .num{color:var(--text)}
.summary-card.pass .num{color:var(--green)}
.summary-card.fail .num{color:var(--red)}
.summary-card.blocked .num{color:var(--amber)}
.summary-card.notrun .num{color:var(--grey)}
.summary-card.pct .num{color:var(--blue)}
.progress-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:20px;box-shadow:var(--shadow)}
.progress-wrap .progress-label{font-size:.8rem;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between}
.progress-bar{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#22d3ee);border-radius:99px;transition:width .4s ease}
.top-tabs{display:flex;gap:0;margin-bottom:14px;border-bottom:2px solid var(--border)}
.top-tab{padding:10px 24px;border:none;background:none;cursor:pointer;font-size:.92rem;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.top-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.top-tab:hover:not(.active){color:var(--text)}
.sub-tabs{display:flex;gap:4px;margin-bottom:14px}
.sub-tab{padding:8px 20px;border:1px solid var(--border);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;background:var(--card);cursor:pointer;font-size:.85rem;font-weight:500;color:var(--muted);transition:all .15s}
.sub-tab.active{background:#1e293b;color:#fff;border-color:#1e293b}
.sub-tab:hover:not(.active){background:#f8fafc}
.filter-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.filter-pill{padding:5px 14px;border-radius:99px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.78rem;font-weight:500;color:var(--muted);transition:all .15s;white-space:nowrap}
.filter-pill:hover{background:#f1f5f9;color:var(--text)}
.filter-pill.active{background:#1e293b;color:#fff;border-color:#1e293b}
.phase-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.category-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.cat-pill{padding:5px 14px;border-radius:99px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.78rem;font-weight:500;color:var(--muted);transition:all .15s;white-space:nowrap}
.cat-pill:hover{background:#f1f5f9;color:var(--text)}
.cat-pill.active{background:#1e293b;color:#fff;border-color:#1e293b}
.cat-badge{font-size:.65rem;padding:2px 10px;border-radius:99px;font-weight:600}
.cat-badge.Legal{background:var(--pink-bg);color:var(--pink)}
.cat-badge.Payments{background:var(--amber-bg);color:var(--amber)}
.cat-badge.Operations{background:var(--blue-bg);color:var(--blue)}
.cat-badge.Marketing{background:var(--green-bg);color:var(--green)}
.actions{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.btn{padding:8px 18px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);cursor:pointer;font-size:.82rem;font-weight:500;color:var(--text);transition:all .15s;box-shadow:var(--shadow)}
.btn:hover{background:#f1f5f9}
.btn.export{background:var(--green);color:#fff;border-color:var(--green)}
.btn.export:hover{opacity:.9}
.btn.reset{background:var(--red);color:#fff;border-color:var(--red)}
.btn.reset:hover{opacity:.9}
.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;background:#f8fafc;border-bottom:1px solid var(--border);transition:background .15s}
.section-header:hover{background:#f1f5f9}
.section-header h3{font-size:.92rem;font-weight:600;display:flex;align-items:center;gap:8px}
.section-header .arrow{transition:transform .2s;font-size:.7rem;color:var(--muted)}
.section-header.collapsed .arrow{transform:rotate(-90deg)}
.section-badge{display:flex;gap:6px;align-items:center}
.mini-badge{font-size:.7rem;padding:2px 8px;border-radius:99px;font-weight:600}
.mini-badge.pass{background:var(--green-bg);color:var(--green)}
.mini-badge.fail{background:var(--red-bg);color:var(--red)}
.mini-badge.blocked{background:var(--amber-bg);color:var(--amber)}
.section-body{transition:max-height .3s ease}
.section-body.collapsed{display:none}
.test-item{border-bottom:1px solid var(--border);padding:10px 16px;transition:background .1s}
.test-item:last-child{border-bottom:none}
.test-item:hover{background:#fafbfd}
.test-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.status-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;transition:all .15s;flex-shrink:0}
.status-btn.pass{background:var(--green);border-color:var(--green);color:#fff}
.status-btn.fail{background:var(--red);border-color:var(--red);color:#fff}
.status-btn.blocked{background:var(--amber);border-color:var(--amber);color:#fff}
.status-btn.notrun{background:#fff;border-color:var(--border);color:var(--grey)}
.status-pill{font-size:.65rem;padding:2px 10px;border-radius:99px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.status-pill.pass{background:var(--green-bg);color:var(--green)}
.status-pill.fail{background:var(--red-bg);color:var(--red)}
.status-pill.blocked{background:var(--amber-bg);color:var(--amber)}
.status-pill.notrun{background:var(--grey-bg);color:var(--grey)}
.test-id{font-size:.75rem;font-weight:600;color:var(--muted);min-width:32px}
.test-title{flex:1;font-size:.88rem;font-weight:500;min-width:200px}
.priority-badge{font-size:.65rem;padding:2px 10px;border-radius:99px;font-weight:600;text-transform:uppercase}
.priority-badge.critical{background:#fee2e2;color:#dc2626}
.priority-badge.high{background:#fef3c7;color:#b45309}
.priority-badge.medium{background:#dbeafe;color:#1d4ed8}
.priority-badge.low{background:#f1f5f9;color:#64748b}
.type-badge{font-size:.65rem;padding:2px 10px;border-radius:99px;font-weight:600}
.type-badge.auth{background:var(--purple-bg);color:var(--purple)}
.type-badge.human{background:var(--blue-bg);color:var(--blue)}
.type-badge.external{background:var(--grey-bg);color:#475569}
.who-badge{font-size:.65rem;padding:2px 10px;border-radius:99px;font-weight:600}
.who-badge.claude{background:var(--purple-bg);color:var(--purple)}
.who-badge.manual{background:var(--green-bg);color:var(--green)}
.who-badge.tool{background:var(--grey-bg);color:#475569}
.expand-btn{background:none;border:none;cursor:pointer;font-size:.8rem;color:var(--muted);padding:4px 8px;border-radius:4px;transition:background .15s}
.expand-btn:hover{background:#e5e7eb}
.detail-panel{display:none;margin-top:10px;padding:12px 16px;background:#f8fafc;border-radius:var(--radius);border:1px solid var(--border);font-size:.82rem}
.detail-panel.open{display:block}
.detail-panel h4{font-size:.8rem;font-weight:600;margin-bottom:6px;color:var(--text)}
.detail-panel ol{padding-left:20px;margin-bottom:8px}
.detail-panel li{margin-bottom:3px}
.detail-panel .expected{background:var(--green-bg);padding:6px 10px;border-radius:6px;font-size:.8rem;margin-bottom:10px}
.detail-panel textarea{width:100%;min-height:50px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:.82rem;font-family:inherit;resize:vertical}
.detail-panel textarea:focus{outline:none;border-color:var(--blue)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;align-items:center;justify-content:center}
.overlay.show{display:flex}
.dialog{background:#fff;border-radius:12px;padding:28px;max-width:400px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.dialog h3{margin-bottom:8px}
.dialog p{color:var(--muted);font-size:.9rem;margin-bottom:20px}
.dialog-btns{display:flex;gap:10px;justify-content:center}
.dialog-btns .btn{min-width:100px}
@media(max-width:900px){
  .container{padding:10px 12px 30px}
  .top-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .top-tab{padding:10px 16px;font-size:.84rem;white-space:nowrap}
  .sub-tab{padding:7px 14px;font-size:.8rem}
  .test-row{gap:6px}
  .test-title{min-width:150px;font-size:.84rem}
  .section-header h3{font-size:.85rem}
  .actions{gap:6px}
  .btn{padding:7px 14px;font-size:.78rem}
}
@media(max-width:700px){
  .header{flex-direction:column;align-items:flex-start;padding:12px 14px;gap:8px}
  .header h1{font-size:1.1rem}
  .header-right{width:100%;justify-content:space-between}
  .header input[type=text]{width:140px;font-size:.8rem;padding:5px 10px}
  .master-summary{padding:12px 14px}
  .master-summary .master-grid{grid-template-columns:repeat(3,1fr);gap:6px}
  .master-summary .master-card .num{font-size:1.2rem}
  .summary{grid-template-columns:repeat(3,1fr);gap:6px}
  .summary-card{padding:8px 6px}
  .summary-card .num{font-size:1.3rem}
  .top-tabs{gap:0;border-bottom:2px solid var(--border)}
  .top-tab{padding:8px 12px;font-size:.78rem}
  .sub-tabs{gap:2px}
  .sub-tab{padding:6px 12px;font-size:.76rem}
  .filter-bar,.phase-bar,.category-bar{padding:8px 10px;gap:4px}
  .filter-pill,.cat-pill{padding:4px 10px;font-size:.72rem}
  .section-header{padding:10px 12px}
  .section-header h3{font-size:.84rem;flex-wrap:wrap}
  .test-item{padding:8px 12px}
  .test-row{gap:6px}
  .test-id{font-size:.7rem;min-width:28px}
  .test-title{min-width:0;flex:1;font-size:.82rem}
  .priority-badge,.type-badge,.who-badge,.status-pill{font-size:.6rem;padding:2px 7px}
  .status-btn{width:28px;height:28px;font-size:.6rem}
  .detail-panel{padding:10px 12px;font-size:.78rem}
  .detail-panel textarea{min-height:40px;font-size:.78rem}
  .actions{gap:4px}
  .btn{padding:6px 12px;font-size:.76rem}
  .dialog{padding:20px;max-width:92%}
}
@media(max-width:420px){
  .container{padding:6px 8px 24px}
  .header h1{font-size:1rem}
  .header .date{font-size:.75rem}
  .header input[type=text]{width:120px}
  .master-summary .master-card .num{font-size:1rem}
  .master-summary .master-card .lbl{font-size:.55rem}
  .summary{grid-template-columns:repeat(3,1fr);gap:4px}
  .summary-card .num{font-size:1.1rem}
  .summary-card .lbl{font-size:.6rem}
  .top-tab{padding:7px 10px;font-size:.72rem}
  .sub-tab{padding:5px 10px;font-size:.7rem}
  .test-row{flex-wrap:wrap}
  .test-title{min-width:100%;order:-1;font-size:.8rem}
  .section-badge{flex-wrap:wrap;gap:4px}
  .mini-badge{font-size:.6rem;padding:1px 6px}
  .expand-btn{font-size:.7rem;padding:3px 6px}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Chittoweb Complete Launch Tracker</h1>
    <div class="header-right">
      <span class="date" id="todayDate"></span>
      <input type="text" id="testerName" placeholder="Tester name..." />
    </div>
  </div>
  <div id="masterSummary" class="master-summary"></div>
  <div class="summary" id="summary"></div>
  <div class="progress-wrap">
    <div class="progress-label"><span id="progressTitle">Overall Completion</span><span id="pctLabel">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="top-tabs">
    <button class="top-tab active" data-top="qaua">QA &amp; UAT (90)</button>
    <button class="top-tab" data-top="launch">Launch Readiness (67)</button>
    <button class="top-tab" data-top="beyond">Beyond Launch (38)</button>
  </div>
  <div id="subTabArea"></div>
  <div id="categoryArea"></div>
  <div id="filterArea"></div>
  <div id="phaseArea"></div>
  <div class="actions">
    <button class="btn export" onclick="exportCSV()">Export CSV</button>
    <button class="btn reset" onclick="showResetDialog()">Reset All</button>
  </div>
  <div id="testContent"></div>
</div>
<div class="overlay" id="resetOverlay">
  <div class="dialog">
    <h3>Reset All Statuses?</h3>
    <p>This will clear all test statuses and notes. This cannot be undone.</p>
    <div class="dialog-btns">
      <button class="btn" onclick="hideResetDialog()">Cancel</button>
      <button class="btn reset" onclick="doReset()">Reset</button>
    </div>
  </div>
</div>
<script>

var MANUAL_TESTS=[
{section:"Google OAuth & Authentication",items:[
{id:"M01",title:"Google SSO button triggers OAuth popup or redirect",priority:"critical",type:"Auth",steps:["Go to /login","Click \u201cSecure Authentication via Google\u201d","Observe"],expected:"Google OAuth screen appears, no error"},

function allItemsForTab(tab){
  var items=[];
  if(tab==="qaua"){
    AUTO_TESTS.forEach(function(s){s.items.forEach(function(i){items.push(Object.assign({},i,{tab:"automated",section:s.section}))})});
    MANUAL_TESTS.forEach(function(s){s.items.forEach(function(i){items.push(Object.assign({},i,{tab:"manual",section:s.section}))})});

    LAUNCH_TESTS.forEach(function(s){s.items.forEach(function(i){items.push(Object.assign({},i,{tab:"launch",section:s.section,phase:s.phase}))})});
  } else {
    BEYOND_TESTS.forEach(function(s){s.items.forEach(function(i){items.push(Object.assign({},i,{tab:"beyond",section:s.section,category:s.category}))})});

  return items;
}

function matchesFilter(item){
  if(activeFilter==="all") return true;
  if(activeFilter.startsWith("type:")) return item.type===activeFilter.slice(5);
  if(activeFilter.startsWith("who:")) return item.who===activeFilter.slice(4);
  if(activeFilter.startsWith("cat:")) return item.cat===activeFilter.slice(4);
  if(["notrun","pass","fail","blocked"].includes(activeFilter)) return getState(item.id).status===activeFilter;
  return item.priority===activeFilter;
}

function renderTests(){
  var sections;
  if(activeTopTab==="qaua"){
    sections=activeSubTab==="automated"?AUTO_TESTS:MANUAL_TESTS;
  } else if(activeTopTab==="launch"){
    sections=LAUNCH_TESTS;
  } else {
    sections=BEYOND_TESTS;
  }
  var container=document.getElementById("testContent");
  var html="";
  sections.forEach(function(sec,si){
    // Phase filter for launch
    if(activeTopTab==="launch" && activePhase!=="all" && String(sec.phase)!==activePhase) return;
    // Category filter for beyond
    if(activeTopTab==="beyond" && activeCategory!=="all" && sec.category!==activeCategory) return;
    var filtered=sec.items.filter(matchesFilter);
    if(filtered.length===0) return;
    var sp=0,sf=0,sb=0;
    sec.items.forEach(function(i){var s=getState(i.id).status;if(s==="pass")sp++;else if(s==="fail")sf++;else if(s==="blocked")sb++});
    var secNum;
    if(activeTopTab==="qaua") secNum=activeSubTab==="automated"?"Section "+(si+1):"Section "+(si+7);
    else secNum="";
    var heading=secNum?secNum+" \u2014 "+sec.section:sec.section;
    html+='<div class="section"><div class="section-header" onclick="toggleSection(this)"><h3><span class="arrow">\u25BC</span> '+heading+'</h3><div class="section-badge">';
    if(sp) html+='<span class="mini-badge pass">'+sp+' pass</span>';
    if(sf) html+='<span class="mini-badge fail">'+sf+' fail</span>';
    if(sb) html+='<span class="mini-badge blocked">'+sb+' blocked</span>';
    html+='</div></div><div class="section-body">';
    filtered.forEach(function(item){
      var st=getState(item.id);
      var sc=st.status;
      var whoClass=item.who?(item.who==="Claude Code"?"claude":item.who==="Manual"?"manual":"tool"):"";
      var typeClass=item.type?(item.type==="Auth"?"auth":item.type==="Human Judgment"?"human":"external"):"";
      html+='<div class="test-item" id="item-'+item.id+'"><div class="test-row">';
      html+='<button class="status-btn '+sc+'" onclick="cycleStatus(\''+item.id+'\')" title="Click to cycle status">'+STATUS_ICONS[sc]+'</button>';
      html+='<span class="status-pill '+sc+'">'+STATUS_LABELS[sc]+'</span>';
      html+='<span class="test-id">'+item.id+'</span>';
      html+='<span class="test-title">'+item.title+'</span>';
      html+='<span class="priority-badge '+item.priority+'">'+item.priority+'</span>';
      if(item.cat) html+='<span class="cat-badge '+item.cat+'">'+item.cat+'</span>';
      if(item.type) html+='<span class="type-badge '+typeClass+'">'+item.type+'</span>';
      if(item.who) html+='<span class="who-badge '+whoClass+'">'+item.who+'</span>';
      html+='<button class="expand-btn" onclick="toggleDetail(\''+item.id+'\')">Details \u25BC</button>';
      html+='</div><div class="detail-panel" id="detail-'+item.id+'">';
      if(item.steps){
        html+='<h4>Steps:</h4><ol>'+item.steps.map(function(s){return '<li>'+s+'</li>'}).join("")+'</ol>';
        html+='<div class="expected"><strong>Expected:</strong> '+item.expected+'</div>';
      } else {
        html+='<p style="color:var(--muted);margin-bottom:10px">Automated test \u2014 run via Playwright, import result here.</p>';
      }
      html+='<h4>Notes / Bug Details:</h4>';
      html+='<textarea placeholder="Add notes, bug links, observations..." oninput="saveNotes(\''+item.id+'\',this.value)">'+(st.notes||"")+'</textarea>';
      html+='</div></div>';
    });
    html+='</div></div>';
  });
  container.innerHTML=html;
}

function toggleSection(el){el.classList.toggle("collapsed");el.nextElementSibling.classList.toggle("collapsed")}
function toggleDetail(id){document.getElementById("detail-"+id).classList.toggle("open")}
function cycleStatus(id){
  var cur=getState(id).status;
  var next=STATUSES[(STATUSES.indexOf(cur)+1)%STATUSES.length];
  setState(id,"status",next);updateSummary();renderTests();
}
function saveNotes(id,val){setState(id,"notes",val)}

// =======================================
// EXPORT CSV
// =======================================
function exportCSV(){
  var items=allItems();
  var tester=testerInput.value||"Unknown";
  var date=new Date().toISOString().slice(0,10);
  var csv="ID,Tab,Section,Title,Priority,Type,Category,Status,Notes,Tester,Date\n";
  items.forEach(function(i){
    var s=getState(i.id);
    var esc=function(v){return '"'+(v||"").replace(/"/g,'""')+'"'};
    var tabName;
    if(i.tab==="automated") tabName="Automated";
    else if(i.tab==="manual") tabName="Manual";
    else if(i.tab==="launch") tabName="Launch";
    else tabName="Beyond Launch";
    var typeOrWho=i.type||i.who||"";
    var catVal=i.cat||i.category||"";
    csv+=i.id+","+tabName+","+esc(i.section)+","+esc(i.title)+","+i.priority+","+esc(typeOrWho)+","+esc(catVal)+","+STATUS_LABELS[s.status]+","+esc(s.notes)+","+esc(tester)+","+date+"\n";
  });
  var blob=new Blob([csv],{type:"text/csv"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download="chittoweb-tracker-"+date+".csv";a.click();
}

function doReset(){state={};localStorage.removeItem("cw_qa_state2");hideResetDialog();updateSummary();renderTests()}

renderSubTabs();renderCategoryBar();renderFilters();renderPhaseBar();updateSummary();renderTests();
